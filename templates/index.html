<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href='/static/css/styles.css'/>
</head>
<body>
    <div class="container">

        <!-- Logo and header -->
        <h1>
            <img src="/static/candiapl-logo-dark.png" alt="Logo" class="header-logo">
            Rubin LSST progress: {{date | safe}}
        </h1>

        <div class="main-layout">

            <!-- Left column: sticky -->
            <div class="left-column">
                <!-- Cumulative visits summary table -->
                <div class="figure-container" id="table-container">
                    <h2>Cumulative Visits Summary</h2>
                    {{table_html | safe}}
                </div>
                <!-- Daily vs Cumulative toggle -->
                <div id="maptype-buttons">
                        <button class="maptype-btn active" data-maptype="daily" onclick="sendMapType('daily')">Daily</button>
                        <button class="maptype-btn" data-maptype="total" onclick="sendMapType('total')">Cumulative</button>
                    </div>
                <!-- Countdown display -->
                <div id="countdown-display">
                    Next update: <span id="countdown-value">--</span>
                </div>
            </div>

            <!-- Right column: scrollable plots -->
            <div class="right-column">
                <!-- 2D visits maps -->
                <div class="figure-container" id="fig1-container">
                    <h2 id="fig1-heading">Daily visits</h2>
                    <div id="fig1-content">
                        {{ fig1_html | safe }}
                    </div>
                </div>
                <!-- Time series progress plot -->
                <div class="figure-container" id="fig2-container">
                    <h2>Progress at target</h2>
                    <div id="fig2-content">
                        {{ fig2_html | safe }}
                    </div>
                </div>
                <!-- Future observability plot -->
                <div class="figure-container">
                    <h2>Future observability of target</h2>
                    <div id="fig3-content">
                        {{ fig3_html | safe }}
                    </div>
                </div>   
            </div>

        </div>
    </div>

    <!-- Bridge: pass Flask data to JS -->
    <div id="server-data"
        data-version="{{ version }}"
        data-countdown="{{ countdown_seconds }}"
        hidden>
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
