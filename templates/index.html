<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href='/static/styles.css'/>
</head>
<body>
    <div class="container">

        <h1>Rubin LSST progress</h1>

        <div class="figure-container" id="table-container">
            <h2>Observation Summary</h2>
            {{table_html | safe}}
        </div>

        <div class="figure-container" id="fig1-container">
            <h2>Visits up to {{date | safe}}</h2>
            <div id="fig1-content">
                {{ fig1_html | safe }}
            </div>
        </div>
        
        <div class="figure-container" id="fig2-container">
            <h2>Progress at target</h2>
            <div id="fig2-content">
                {{ fig2_html | safe }}
            </div>
        </div>

        <div class="figure-container">
            <h2>Future observability of target</h2>
            {{ fig3_html | safe }}
        </div>
    </div>

    <script>
    {% raw %}
        const rows = document.querySelectorAll('.data-table tbody tr');

        rows.forEach((row, index) => {
            row.classList.add('clickable');
            row.addEventListener('click', () => {
                // Update highlighting immediately
                rows.forEach(r => r.classList.remove('selected'));
                row.classList.add('selected');

                // Then send the request
                fetch('/row_clicked', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({index: index})
                })
                .then(res => res.json())
                .then(data => {
                    // Update figure 1
                    const container1 = document.getElementById('fig1-content');
                    container1.innerHTML = data.fig1_html;
                    container1.querySelectorAll('script').forEach(oldScript => {
                        const newScript = document.createElement('script');
                        newScript.textContent = oldScript.textContent;
                        oldScript.parentNode.replaceChild(newScript, oldScript);
                    });

                    // Update figure 2
                    const container2 = document.getElementById('fig2-content');
                    container2.innerHTML = data.fig2_html;
                    container2.querySelectorAll('script').forEach(oldScript => {
                        const newScript = document.createElement('script');
                        newScript.textContent = oldScript.textContent;
                        oldScript.parentNode.replaceChild(newScript, oldScript);
                    });
                })

                .catch(err => console.error('Fetch error:', err));
            });
        });
    {% endraw %}
    </script>

    <script>
    const loadedVersion = {{ version }};
    setInterval(async () => {
        const resp = await fetch("/check_update");
        const data = await resp.json();
        if (data.version > loadedVersion) {
            location.reload();
        }
    }, 1000);
    </script>

</body>
</html>
